// ===================== AI ASSISTANT =====================
function AIAssistant() {
  const [isOpen, setIsOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [isLoading, setIsLoading] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  };

  useEffect(() => {
    scrollToBottom();
  }, [messages]);

  const scrollToBottomOnOpen = useEffect(() => {
    if (isOpen && messages.length === 0) {
      setTimeout(() => scrollToBottom(), 100);
    }
  }, [isOpen]);

  // Simple fuzzy search
  const fuzzyMatch = (query, text) => {
    const q = query.toLowerCase();
    const t = text.toLowerCase();
    let score = 0;
    let qi = 0;
    for (let i = 0; i < t.length && qi < q.length; i++) {
      if (t[i] === q[qi]) {
        score += 1;
        qi++;
      }
    }
    return qi === q.length ? score : -1;
  };

  // Search courses by name, description, department
  const searchCourses = (query) => {
    const q = query.toLowerCase();
    return DATA.courses.filter(c =>
      c.name.toLowerCase().includes(q) ||
      (c.description && c.description.toLowerCase().includes(q)) ||
      (c.department && c.department.toLowerCase().includes(q))
    ).slice(0, 5);
  };

  // Search pathways and clusters
  const searchPathways = (query) => {
    const q = query.toLowerCase();
    const results = [];
    DATA.clusters.forEach(cluster => {
      cluster.pathways.forEach(pathway => {
        if (pathway.name.toLowerCase().includes(q) ||
            (pathway.description && pathway.description.toLowerCase().includes(q)) ||
            cluster.name.toLowerCase().includes(q)) {
          results.push({ ...pathway, clusterName: cluster.name, clusterColor: cluster.color });
        }
      });
    });
    return results.slice(0, 5);
  };

  // Find matching counselor by school
  const findCounselor = (schoolQuery) => {
    const q = schoolQuery.toLowerCase();
    return DATA.counselors.filter(c => c.school.toLowerCase().includes(q));
  };

  // Find matching school
  const findSchool = (schoolQuery) => {
    const q = schoolQuery.toLowerCase();
    return DATA.schools.filter(s => s.name.toLowerCase().includes(q) || s.address.toLowerCase().includes(q));
  };

  // Course card component for assistant responses
  const CourseCard = ({ course }) => (
    <div className="bg-gray-50 rounded-lg p-3 mb-2 border-l-4 border-d214red">
      <div className="font-medium text-gray-900 text-sm">{course.name}</div>
      <div className="text-xs text-gray-500 mt-1">{course.code} • Grade {course.gradeLevel} • {course.creditSemester} credits/sem</div>
      {course.description && <div className="text-xs text-gray-600 mt-2">{course.description.substring(0, 80)}...</div>}
      {course.department && <div className="text-xs text-gray-400 mt-1">{course.department}</div>}
    </div>
  );

  // Pathway card component
  const PathwayCard = ({ pathway, clusterName, clusterColor }) => (
    <div className="bg-gray-50 rounded-lg p-3 mb-2 border-l-4" style={{borderLeftColor: clusterColor || '#ba0c2f'}}>
      <div className="font-medium text-gray-900 text-sm">{pathway.name}</div>
      <div className="text-xs text-gray-500 mt-1">{clusterName}</div>
      {pathway.description && <div className="text-xs text-gray-600 mt-2">{pathway.description.substring(0, 80)}...</div>}
    </div>
  );

  // Main AI logic
  const processQuery = (query) => {
    const q = query.toLowerCase();

    // Greeting
    if (q.match(/^(hi|hello|hey|greetings)/)) {
      return {
        type: 'text',
        text: "Hello! I can help you explore D214 courses, career pathways, graduation requirements, and more. For personalized guidance, please meet with your school counselor. What would you like to look up?"
      };
    }

    // What can I help with
    if (q.match(/^(what|how|help|can you|do you)/)) {
      return {
        type: 'help',
        text: "I can help you look up:"
      };
    }

    // Course searches
    if (q.match(/course|class|subject|math|english|science|engineering|computer|technology|business|arts|language/)) {
      const courses = searchCourses(query);
      if (courses.length > 0) {
        return {
          type: 'courses',
          text: `Found ${courses.length} course${courses.length !== 1 ? 's' : ''} matching your interests:`,
          data: courses
        };
      }
      return {
        type: 'text',
        text: "I couldn't find courses matching that query. Try searching by department (like 'Engineering', 'Business', 'Health Sciences') or by level (like 'Grade 9' or 'Grade 12')."
      };
    }

    // Pathway/cluster searches
    if (q.match(/pathway|career|cluster|interested in|explore|what.*career|health|engineering|business|technology|arts|skilled trades|manufacturing|agriculture|finance|hospitality|law|marketing|human|information|transportation/)) {
      const pathways = searchPathways(query);
      if (pathways.length > 0) {
        return {
          type: 'pathways',
          text: `I found ${pathways.length} matching pathway${pathways.length !== 1 ? 's' : ''}:`,
          data: pathways
        };
      }
      const clusters = DATA.clusters.filter(c =>
        c.name.toLowerCase().includes(query.toLowerCase())
      );
      if (clusters.length > 0) {
        return {
          type: 'clusters',
          text: `Here are our career clusters:`,
          data: clusters
        };
      }
      return {
        type: 'text',
        text: "We have 39 career pathways across 10 industry clusters. Try asking about specific interests like 'engineering', 'health sciences', 'business', or 'skilled trades'. Meet with your school counselor to discuss which pathway is right for you."
      };
    }

    // Graduation requirements
    if (q.match(/graduat|requirement|needed|credit|need to gradu|how many credit/)) {
      return {
        type: 'gradReqs',
        text: "Here are D214's graduation requirements. Meet with your school counselor to make sure you're on track:",
        data: DATA.gradReqs
      };
    }

    // University/college requirements
    if (q.match(/universit|college|admission|admission requirement|prepare for college|college prep|4-year|what.*need for college/)) {
      return {
        type: 'uniReqs',
        text: "Here are the recommended preparations for competitive 4-year university admission. Meet with your school counselor to plan your courses:",
        data: DATA.uniReqs
      };
    }

    // Counselor search
    if (q.match(/counselor|advisor|guidance|rolling meadows|prospect|elk grove|mt. prospect|buffalo grove|wheeling|contact|phone|email/)) {
      const schoolMatch = query.match(/at\s+(\w+(?:\s+\w+)?)/i) || query.match(/(rolling meadows|prospect|elk grove|mt\. prospect|buffalo grove|wheeling)/i);
      if (schoolMatch) {
        const school = schoolMatch[1];
        const counselors = findCounselor(school);
        if (counselors.length > 0) {
          return {
            type: 'counselors',
            text: `College counselors at ${school}:`,
            data: counselors
          };
        }
      }
      return {
        type: 'text',
        text: "We have college counselors at all six D214 schools. Try asking 'who is my counselor at [school name]' or 'contact counselor at [school]'."
      };
    }

    // School info
    if (q.match(/school|location|address|rolling meadows|prospect|elk grove|mt\. prospect|buffalo grove|wheeling|where|contact/)) {
      const schools = findSchool(query);
      if (schools.length > 0) {
        return {
          type: 'schools',
          text: `School information:`,
          data: schools
        };
      }
      return {
        type: 'text',
        text: "We have 6 schools in District 214. Ask about a specific school like 'Prospect High School' or 'Rolling Meadows' to get contact information and addresses."
      };
    }

    // Default helpful response
    return {
      type: 'text',
      text: "I can help you search courses, explore career pathways, look up graduation requirements, and find school contact info. For personalized guidance, please meet with your school counselor. What would you like to look up?"
    };
  };

  const handleSend = () => {
    if (!input.trim()) return;

    const userMsg = { role: 'user', content: input };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setIsLoading(true);

    // Simulate brief thinking time
    setTimeout(() => {
      const response = processQuery(input);

      let contentElement;
      if (response.type === 'text' || response.type === 'help') {
        contentElement = <div>{response.text}</div>;
      } else if (response.type === 'courses') {
        contentElement = (
          <div>
            <div>{response.text}</div>
            <div className="mt-3">
              {response.data.map(c => <CourseCard key={c.code} course={c} />)}
            </div>
          </div>
        );
      } else if (response.type === 'pathways') {
        contentElement = (
          <div>
            <div>{response.text}</div>
            <div className="mt-3">
              {response.data.map((p, i) => <PathwayCard key={i} pathway={p} clusterName={p.clusterName} clusterColor={p.clusterColor} />)}
            </div>
          </div>
        );
      } else if (response.type === 'clusters') {
        contentElement = (
          <div>
            <div>{response.text}</div>
            <div className="space-y-2 mt-3">
              {response.data.map(c => (
                <div key={c.id} className="bg-gray-50 rounded-lg p-3 flex items-center gap-3">
                  <ClusterIcon clusterId={c.id} size={32} />
                  <div>
                    <div className="font-medium text-gray-900 text-sm">{c.name}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{c.pathways.length} pathways • {c.abbrev}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      } else if (response.type === 'gradReqs') {
        contentElement = (
          <div>
            <div>{response.text}</div>
            <div className="space-y-2 mt-3">
              {Object.entries(response.data).map(([key, req]) => (
                <div key={key} className="bg-gray-50 rounded-lg p-3 border-l-4 border-d214red">
                  <div className="font-medium text-gray-900 text-sm">{req.name}</div>
                  <div className="text-xs text-gray-600 mt-1">{req.notes}</div>
                  {typeof req.credits === 'number' && req.credits > 0 && <div className="text-xs text-gray-500 mt-1">{req.credits} credit unit{req.credits !== 1 ? 's' : ''}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      } else if (response.type === 'uniReqs') {
        contentElement = (
          <div>
            <div>{response.text}</div>
            <div className="space-y-2 mt-3">
              {Object.entries(response.data).map(([key, val]) => (
                <div key={key} className="flex items-center gap-2">
                  <div className="font-medium text-gray-900 text-sm">{key}:</div>
                  <div className="text-sm text-gray-600">{val}</div>
                </div>
              ))}
            </div>
          </div>
        );
      } else if (response.type === 'counselors') {
        contentElement = (
          <div>
            <div>{response.text}</div>
            <div className="space-y-2 mt-3">
              {response.data.map((c, i) => (
                <div key={i} className="bg-gray-50 rounded-lg p-3 border-l-4 border-blue-600">
                  <div className="font-medium text-gray-900 text-sm">{c.name}</div>
                  <div className="text-xs text-gray-600 mt-1">{c.phone}</div>
                  <a href={`mailto:${c.email}`} className="text-xs text-blue-600 hover:underline">{c.email}</a>
                </div>
              ))}
            </div>
          </div>
        );
      } else if (response.type === 'schools') {
        contentElement = (
          <div>
            <div>{response.text}</div>
            <div className="space-y-2 mt-3">
              {response.data.map((s, i) => (
                <div key={i} className="bg-gray-50 rounded-lg p-3 border-l-4 border-d214red">
                  <div className="font-medium text-gray-900 text-sm">{s.name}</div>
                  <div className="text-xs text-gray-600 mt-1">{s.address}</div>
                  <div className="text-xs text-gray-600">{s.phone}</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      const assistantMsg = { role: 'assistant', content: contentElement };
      setMessages(prev => [...prev, assistantMsg]);
      setIsLoading(false);
    }, 500);
  };

  const quickActions = [
    { label: 'Find Courses', query: 'What math courses are available?' },
    { label: 'Career Pathways', query: 'Tell me about career pathways' },
    { label: 'Graduation Requirements', query: 'What do I need to graduate?' },
    { label: 'University Prep', query: 'How do I prepare for college?' }
  ];

  if (!isOpen) {
    return (
      <button
        onClick={() => setIsOpen(true)}
        className="fixed bottom-6 right-6 w-14 h-14 bg-d214red text-white rounded-full shadow-elevated hover:shadow-hover hover:scale-105 transition-all duration-200 z-40 flex items-center justify-center"
        title="Open D214 Course Explorer"
      >
        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </button>
    );
  }

  return (
    <div className="fixed bottom-6 right-6 w-96 max-h-96 bg-white rounded-2xl shadow-modal flex flex-col z-40 chat-slide-in border border-gray-100" style={{maxHeight: '600px'}}>
      {/* Header */}
      <div className="bg-d214red text-white rounded-t-2xl p-5 flex justify-between items-start">
        <div>
          <h3 className="font-bold text-lg tracking-tight">D214 Course Explorer</h3>
          <p className="text-xs text-red-200 italic mt-0.5"><span className="font-bold">Discover</span> <span className="font-light">your future.</span></p>
        </div>
        <button
          onClick={() => setIsOpen(false)}
          className="text-white hover:bg-red-600 p-1 rounded-lg transition"
        >
          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      {/* Messages Area */}
      <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50" role="log" aria-live="polite" aria-label="Chat messages">
        {messages.length === 0 ? (
          <div className="h-full flex flex-col justify-center items-center text-center">
            <div className="text-4xl mb-2">Hi there!</div>
            <p className="text-sm text-gray-600 mb-4">Search D214 courses, pathways, and graduation info. For personalized planning, meet with your school counselor.</p>
            <div className="space-y-2 w-full">
              {quickActions.map((action, i) => (
                <button
                  key={i}
                  onClick={() => {
                    setInput(action.query);
                    setTimeout(() => {
                      const userMsg = { role: 'user', content: action.query };
                      setMessages([userMsg]);
                      setInput('');
                      setIsLoading(true);
                      setTimeout(() => {
                        const response = processQuery(action.query);
                        let contentElement;
                        if (response.type === 'text' || response.type === 'help') {
                          contentElement = <div>{response.text}</div>;
                        } else if (response.type === 'courses') {
                          contentElement = (
                            <div>
                              <div>{response.text}</div>
                              <div className="mt-3">
                                {response.data.map(c => <CourseCard key={c.code} course={c} />)}
                              </div>
                            </div>
                          );
                        } else if (response.type === 'pathways') {
                          contentElement = (
                            <div>
                              <div>{response.text}</div>
                              <div className="mt-3">
                                {response.data.map((p, i) => <PathwayCard key={i} pathway={p} clusterName={p.clusterName} clusterColor={p.clusterColor} />)}
                              </div>
                            </div>
                          );
                        } else if (response.type === 'gradReqs') {
                          contentElement = (
                            <div>
                              <div>{response.text}</div>
                              <div className="space-y-2 mt-3">
                                {Object.entries(response.data).map(([key, req]) => (
                                  <div key={key} className="bg-gray-50 rounded-lg p-3 border-l-4 border-d214red">
                                    <div className="font-medium text-gray-900 text-sm">{req.name}</div>
                                    <div className="text-xs text-gray-600 mt-1">{req.notes}</div>
                                    {typeof req.credits === 'number' && req.credits > 0 && <div className="text-xs text-gray-500 mt-1">{req.credits} credit unit{req.credits !== 1 ? 's' : ''}</div>}
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        } else if (response.type === 'uniReqs') {
                          contentElement = (
                            <div>
                              <div>{response.text}</div>
                              <div className="space-y-2 mt-3">
                                {Object.entries(response.data).map(([key, val]) => (
                                  <div key={key} className="flex items-center gap-2">
                                    <div className="font-medium text-gray-900 text-sm">{key}:</div>
                                    <div className="text-sm text-gray-600">{val}</div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        }
                        const assistantMsg = { role: 'assistant', content: contentElement };
                        setMessages(prev => [...prev, assistantMsg]);
                        setIsLoading(false);
                      }, 500);
                    }, 0);
                  }}
                  className="w-full text-left text-xs bg-white border border-d214red text-d214red rounded-lg px-3 py-2 hover:bg-red-50 transition"
                >
                  {action.label}
                </button>
              ))}
            </div>
          </div>
        ) : (
          <>
            {messages.map((msg, i) => (
              <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div
                  className={`max-w-[85%] rounded-lg p-3 text-sm ${
                    msg.role === 'user'
                      ? 'bg-d214red text-white'
                      : 'bg-white border border-gray-200'
                  }`}
                >
                  {typeof msg.content === 'string' ? msg.content : msg.content}
                </div>
              </div>
            ))}
            {isLoading && (
              <div className="flex justify-start">
                <div className="bg-white border border-gray-200 rounded-lg p-3 flex gap-1">
                  <div className="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                  </div>
                </div>
              </div>
            )}
            <div ref={messagesEndRef} />
          </>
        )}
      </div>

      {/* Input Area */}
      <div className="border-t bg-white rounded-b-2xl p-3 flex gap-2">
        <input
          type="text"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyPress={e => e.key === 'Enter' && handleSend()}
          placeholder="Ask me anything..."
          className="flex-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-d214red focus:outline-none"
          disabled={isLoading}
          aria-label="Ask a question about D214 courses and pathways"
        />
        <button
          onClick={handleSend}
          disabled={isLoading || !input.trim()}
          className="bg-d214red text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
        >
          Send
        </button>
      </div>
    </div>
  );
}

// ===================== PATHWAYS =====================
function PathwaysTab() {
  const [selectedCluster, setSelectedCluster] = useState(null);
  const [selectedPathway, setSelectedPathway] = useState(null);

  if (selectedPathway) {
    const cluster = DATA.clusters.find(c => c.pathways.some(p => p.id === selectedPathway.id));
    return (
      <div>
        <button onClick={() => setSelectedPathway(null)} className="text-gray-400 text-sm font-medium mb-6 hover:text-d214red transition-colors inline-flex items-center gap-1">{"\u2190"} Back to {cluster ? cluster.name : 'Pathways'}</button>
        <div className="bg-white rounded-2xl shadow-elevated p-8 md:p-10">
          {cluster && <span className="text-xs font-medium px-3 py-1.5 rounded-full mb-4 inline-flex items-center gap-2 bg-red50 text-d214red"><ClusterIcon clusterId={cluster.id} size={18} />{cluster.name}</span>}
          <h2 className="text-3xl font-bold text-gray-900 mb-4 tracking-editorial">{selectedPathway.name}</h2>
          <p className="text-gray-500 mb-8 leading-relaxed max-w-3xl">{selectedPathway.description}</p>

          <h3 className="text-lg font-semibold text-gray-900 mb-4">Recommended Course Sequence</h3>
          <div className="grid sm:grid-cols-4 gap-4 mb-10">
            {['9','10','11','12'].map(grade => (
              <div key={grade} className="bg-gray-50 rounded-xl p-5">
                <div className="text-xs font-bold text-d214red mb-3 uppercase tracking-wider">Grade {grade}</div>
                {(selectedPathway.courseSequence[grade] || []).length > 0 ?
                  selectedPathway.courseSequence[grade].map((c,i) => (
                    <div key={i} className="text-sm text-gray-700 py-1.5 border-b border-gray-200 last:border-0">{c}</div>
                  )) :
                  <div className="text-sm text-gray-400 italic">No pathway courses</div>

          </div>

          {selectedPathway.careers && selectedPathway.careers.length > 0 && (
            <div className="mb-10">
              <h3 className="text-lg font-semibold text-gray-900 mb-4">Future Careers &amp; Salary Outlook</h3>
              <p className="text-xs text-gray-500 mb-4">Salary and job outlook data from the <a href="https://www.bls.gov/ooh/" target="_blank" rel="noopener noreferrer" className="text-d214red hover:underline">U.S. Bureau of Labor Statistics</a>. Meet with your school counselor for personalized guidance.</p>
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {selectedPathway.careers.map((career, i) => {

                    <div key={i} className="bg-gray-50 rounded-xl p-4 flex flex-col">
                      <div className="font-medium text-gray-900 text-sm mb-2">{career}</div>

                        <div className="flex-1">
                          <div className="flex items-baseline gap-3 mb-1.5">

                          </div>
                          <div className="flex items-center gap-2 mb-2">
                            <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${cd.growth.startsWith('-') ? 'bg-red-100 text-red-700' : cd.outlook === 'Much faster than average' ? 'bg-green-100 text-green-700' : 'bg-blue-50 text-blue-700'}`}>{cd.growth}</span>
                            <span className="text-xs text-gray-500">{cd.outlook}</span>

                        <div className="text-xs text-gray-400 italic">Salary data not available</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <div className="grid sm:grid-cols-2 gap-8">
            {[
              { items: selectedPathway.relatedElectives, title: 'Career Related Electives' },
              { items: selectedPathway.collegePrograms, title: 'Potential College Programs' },
              { items: selectedPathway.certifications, title: 'Industry Certifications' },
              { items: selectedPathway.workBasedLearning, title: 'Work-Based Learning' },
              { items: selectedPathway.activities, title: 'Career Related Activities' }
            ].filter(s => s.items && s.items.length > 0).map((section, idx) => (
              <div key={idx}>
                <h4 className="font-semibold text-gray-900 mb-3 text-sm uppercase tracking-wider">{section.title}</h4>
                <ul className="space-y-1.5">{section.items.map((item,i) => <li key={i} className="text-sm text-gray-600 flex items-start gap-2"><span className="text-d214red mt-1 text-xs">{"\u25CF"}</span>{item}</li>)}</ul>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (selectedCluster) {
    return (
      <div>
        <button onClick={() => setSelectedCluster(null)} className="text-gray-400 text-sm font-medium mb-6 hover:text-d214red transition-colors inline-flex items-center gap-1">{"\u2190"} All Career Clusters</button>
        <div className="mb-8 flex items-center gap-5">
          <ClusterIcon clusterId={selectedCluster.id} size={56} />
          <div>
            <h2 className="text-3xl font-bold text-gray-900 tracking-editorial">{selectedCluster.name}</h2>
            <p className="text-gray-400 text-sm mt-1">{selectedCluster.abbrev} &bull; {selectedCluster.pathways.length} pathways</p>

        </div>
        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
          {selectedCluster.pathways.map(p => (
            <div key={p.id} onClick={() => setSelectedPathway(p)} className="bg-white rounded-2xl shadow-soft p-6 cursor-pointer card-hover">
              <h3 className="font-semibold text-gray-900 mb-2">{p.name}</h3>
              <p className="text-sm text-gray-500 mb-4 leading-relaxed" style={{display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden'}}>{p.description}</p>
              <div className="flex flex-wrap gap-1.5">
                {(p.careers || []).slice(0,3).map((c,i) => (
                  <span key={i} className="text-xs bg-gray-50 text-gray-500 px-2.5 py-1 rounded-full">{c}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <h2 className="text-3xl font-bold text-gray-900 mb-2 tracking-editorial">Career Clusters &amp; Pathways</h2>
      <p className="text-gray-500 mb-8">Explore 10 career clusters and 39 pathways to find the right fit for your interests and goals.</p>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {DATA.clusters.map(c => (
          <div key={c.id} onClick={() => setSelectedCluster(c)} onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && (e.preventDefault(), setSelectedCluster(c))} tabIndex={0} role="button" aria-label={`${c.name} - ${c.pathways.length} pathways`} className="bg-white rounded-2xl shadow-soft p-6 cursor-pointer card-hover">
            <div className="flex items-center gap-4 mb-4">
              <ClusterIcon clusterId={c.id} size={44} />
              <div>
                <h3 className="font-semibold text-gray-900">{c.name}</h3>
                <p className="text-xs text-gray-400 mt-0.5">{c.pathways.length} pathways</p>
              </div>
            </div>
            <div className="flex flex-wrap gap-1.5">
              {c.pathways.slice(0,3).map((p,i) => (
                <span key={i} className="text-xs bg-gray-50 text-gray-500 px-2.5 py-1 rounded-full">{p.name}</span>
              ))}
              {c.pathways.length > 3 && <span className="text-xs text-gray-400">+{c.pathways.length - 3} more</span>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ===================== COURSES =====================
function CoursesTab() {
  const [search, setSearch] = useState('');
  const [dept, setDept] = useState('');
  const [grade, setGrade] = useState('');
  const [courseType, setCourseType] = useState('');
  const [expanded, setExpanded] = useState(null);
  const [sortBy, setSortBy] = useState('name');
  const PAGE_SIZE = 50;
  const [showCount, setShowCount] = useState(PAGE_SIZE);

  const getCourseType = (c) => {
    if (c.name.startsWith('AP ')) return 'ap';
    if (c.name.startsWith('College ')) return 'dc';
    if (c.name.includes('Honors')) return 'honors';
    return null;
  };

  const apCount = useMemo(() => DATA.courses.filter(c => c.name.startsWith('AP ')).length, []);
  const dcCount = useMemo(() => DATA.courses.filter(c => c.name.startsWith('College ')).length, []);
  const honorsCount = useMemo(() => DATA.courses.filter(c => c.name.includes('Honors')).length, []);

  const departments = useMemo(() => {
    const d = new Set();
    DATA.courses.forEach(c => { if(c.department) d.add(c.department); });
    return Array.from(d).sort();
  }, []);

  const filtered = useMemo(() => {
    let result = DATA.courses.filter(c => {
      if (search && !c.name.toLowerCase().includes(search.toLowerCase()) && !c.code.includes(search)) return false;
      if (dept && c.department !== dept) return false;
      if (grade && !c.gradeLevel.includes(grade)) return false;
      if (courseType) {
        const ct = getCourseType(c);
        if (courseType === 'ap' && ct !== 'ap') return false;
        if (courseType === 'dc' && ct !== 'dc') return false;
        if (courseType === 'honors' && ct !== 'honors') return false;
      }
      return true;
    });
    result.sort((a,b) => {
      if (sortBy === 'name') return a.name.localeCompare(b.name);
      if (sortBy === 'code') return a.code.localeCompare(b.code);
      if (sortBy === 'dept') return (a.department||'').localeCompare(b.department||'');
      return 0;
    });
    return result;
  }, [search, dept, grade, courseType, sortBy]);

  const visible = filtered.slice(0, showCount);

  return (
    <div>
      <h2 className="text-3xl font-bold text-gray-900 mb-2 tracking-editorial">Course Catalog</h2>
      <p className="text-gray-500 mb-6">{DATA.courses.length} courses available. Search, filter, and view full course details.</p>

      <div className="bg-white rounded-2xl shadow-soft p-5 md:p-6 mb-6">
        <div className="grid sm:grid-cols-4 gap-4 mb-4">
          <input type="text" placeholder="Search by name or code..." value={search} onChange={e => { setSearch(e.target.value); setShowCount(PAGE_SIZE); }}
            className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50 focus:bg-white transition-colors" aria-label="Search courses by name or code" />
          <select value={dept} onChange={e => { setDept(e.target.value); setShowCount(PAGE_SIZE); }} className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50" aria-label="Filter by department">
            <option value="">All Departments</option>
            {departments.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
          <select value={grade} onChange={e => { setGrade(e.target.value); setShowCount(PAGE_SIZE); }} className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50" aria-label="Filter by grade level">
            <option value="">All Grade Levels</option>
            {['9','10','11','12'].map(g => <option key={g} value={g}>Grade {g}</option>)}
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50" aria-label="Sort courses by">
            <option value="name">Sort by Name</option>
            <option value="code">Sort by Code</option>
            <option value="dept">Sort by Department</option>
          </select>
        </div>
        <div className="flex gap-2 flex-wrap">
          <button onClick={() => { setCourseType(courseType === 'ap' ? '' : 'ap'); setShowCount(PAGE_SIZE); }}
            className={`inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all ${courseType === 'ap' ? 'bg-blue-600 text-white shadow-soft' : 'bg-blue-50 text-blue-700 hover:bg-blue-100'}`}>
            <span className="w-1.5 h-1.5 rounded-full bg-current"></span> AP Courses ({apCount})
          </button>
          <button onClick={() => { setCourseType(courseType === 'dc' ? '' : 'dc'); setShowCount(PAGE_SIZE); }}
            className={`inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all ${courseType === 'dc' ? 'bg-amber-600 text-white shadow-soft' : 'bg-amber-50 text-amber-700 hover:bg-amber-100'}`}>
            <span className="w-1.5 h-1.5 rounded-full bg-current"></span> Dual Credit ({dcCount})
          </button>
          <button onClick={() => { setCourseType(courseType === 'honors' ? '' : 'honors'); setShowCount(PAGE_SIZE); }}
            className={`inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all ${courseType === 'honors' ? 'bg-purple-600 text-white shadow-soft' : 'bg-purple-50 text-purple-700 hover:bg-purple-100'}`}>
            <span className="w-1.5 h-1.5 rounded-full bg-current"></span> Honors ({honorsCount})
          </button>
          {courseType && <button onClick={() => { setCourseType(''); setShowCount(PAGE_SIZE); }} className="text-xs text-gray-400 hover:text-gray-600 px-2 transition-colors">Clear filter</button>}
        </div>
      </div>

      <p className="text-xs text-gray-500 mb-4 uppercase tracking-wider font-medium">Showing {Math.min(showCount, filtered.length)} of {filtered.length} courses</p>

      <div className="space-y-2">
        {visible.map(c => (
          <div key={c.code + c.name} className="bg-white rounded-xl shadow-soft overflow-hidden transition-all duration-200 hover:shadow-elevated">
            <div className="flex items-center justify-between px-5 py-4 cursor-pointer" role="button" tabIndex={0} aria-expanded={expanded === c.code} aria-label={`${c.name} - click to ${expanded === c.code ? 'collapse' : 'expand'} details`} onClick={() => setExpanded(expanded === c.code ? null : c.code)} onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && (e.preventDefault(), setExpanded(expanded === c.code ? null : c.code))}>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2.5 flex-wrap">
                  <span className="font-medium text-gray-900">{c.name}</span>
                  <span className="text-xs text-gray-500 font-mono bg-gray-100 px-2 py-0.5 rounded-md">{c.code}</span>
                  {c.name.startsWith('AP ') && <span className="text-xs bg-blue-100 text-blue-700 px-2.5 py-0.5 rounded-full font-semibold">AP</span>}
                  {c.name.startsWith('College ') && <span className="text-xs bg-amber-100 text-amber-700 px-2.5 py-0.5 rounded-full font-semibold">Dual Credit</span>}
                  {c.name.includes('Honors') && <span className="text-xs bg-purple-100 text-purple-700 px-2.5 py-0.5 rounded-full font-semibold">Honors</span>}
                  {c.ncaa && <span className="text-xs bg-green-50 text-green-600 px-2 py-0.5 rounded-full font-medium">NCAA</span>}
                </div>
                <div className="flex gap-3 mt-1.5 text-xs text-gray-600">
                  <span>Grade {c.gradeLevel}</span>
                  <span>{c.creditSemester} credits/sem</span>
                  {c.department && <span className="text-gray-500">{c.department}</span>}
                </div>
              </div>
              <svg className={`w-4 h-4 text-gray-300 transition-transform duration-200 ${expanded === c.code ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
            {expanded === c.code && (
              <div className="px-5 pb-5 border-t border-gray-100 bg-gray-50">
                <div className="grid sm:grid-cols-2 gap-4 mt-4">
                  <div><span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Prerequisite</span><p className="text-sm text-gray-800 mt-1">{c.prerequisite || 'None'}</p></div>
                  <div><span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Department</span><p className="text-sm text-gray-800 mt-1">{c.department || 'N/A'}</p></div>
                </div>
                {c.description && (
                  <div className="mt-4"><span className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Description</span><p className="text-sm text-gray-700 mt-1 leading-relaxed">{c.description}</p></div>
                )}
              </div>
            )}
          </div>
        ))}
      </div>

      {showCount < filtered.length && (
        <button onClick={() => setShowCount(s => s + PAGE_SIZE)} className="mt-6 w-full py-3 bg-white rounded-xl shadow-soft text-sm font-medium text-gray-600 hover:text-d214red hover:shadow-elevated transition-all duration-200">
          Load More ({filtered.length - showCount} remaining)
        </button>
      )}
    </div>
  );
}

// ===================== PLANNER =====================
function PlannerTab() {
  const [plan, setPlan] = useState({ 9:[], 10:[], 11:[], 12:[] });
  const [addingGrade, setAddingGrade] = useState(null);
  const [courseSearch, setCourseSearch] = useState('');
  const [templateCluster, setTemplateCluster] = useState('');
  const [templatePathway, setTemplatePathway] = useState('');

  const addCourse = (grade, course) => {
    if (plan[grade].some(c => c.code === course.code)) return;
    setPlan(p => ({ ...p, [grade]: [...p[grade], course] }));
    setCourseSearch('');
    setAddingGrade(null);
  };

  const removeCourse = (grade, code) => {
    setPlan(p => ({ ...p, [grade]: p[grade].filter(c => c.code !== code) }));
  };

  const loadTemplate = () => {
    if (!templatePathway) return;
    const cluster = DATA.clusters.find(c => c.id === templateCluster);
    if (!cluster) return;
    const pathway = cluster.pathways.find(p => p.id === templatePathway);
    if (!pathway) return;

    const newPlan = { 9:[], 10:[], 11:[], 12:[] };
    ['9','10','11','12'].forEach(g => {
      const courseNames = pathway.courseSequence[g] || [];
      courseNames.forEach(name => {
        const searchName = name.toLowerCase().substring(0, 20);
        const match = DATA.courses.find(c => c.name.toLowerCase().includes(searchName));
        if (match) {
          newPlan[parseInt(g)].push(match);
        } else {
          newPlan[parseInt(g)].push({ name: name, code: 'TBD', gradeLevel: g, creditSemester: '0.5', department: 'Pathway', description: '', prerequisite: '', ncaa: false });
        }
      });
    });
    setPlan(newPlan);
  };

  const totalCredits = (grade) => plan[grade].reduce((sum, c) => sum + (parseFloat(c.creditSemester) || 0), 0);
  const allCredits = [9,10,11,12].reduce((sum,g) => sum + totalCredits(g), 0);

  const deptCredits = useMemo(() => {
    const dc = {};
    [9,10,11,12].forEach(g => {
      plan[g].forEach(c => {
        const d = c.department || 'Other';
        dc[d] = (dc[d] || 0) + (parseFloat(c.creditSemester) || 0);
      });
    });
    return dc;
  }, [plan]);

  const reqProgress = [
    { name: 'English', have: deptCredits['English'] || 0, need: 4.0 },
    { name: 'Mathematics', have: deptCredits['Mathematics'] || 0, need: 3.0 },
    { name: 'Social Science', have: deptCredits['Social Science'] || 0, need: 2.0 },
    { name: 'Science', have: deptCredits['Science'] || 0, need: 2.0 },
    { name: 'CTE', have: deptCredits['Career and Technical Education'] || 0, need: 1.0 },
    { name: 'Fine Arts', have: deptCredits['Fine Arts'] || 0, need: 0.25 }
  ];

  const searchResults = useMemo(() => {
    if (!courseSearch || courseSearch.length < 2 || !addingGrade) return [];
    const gradeStr = String(addingGrade);
    return DATA.courses.filter(c =>
      (c.name.toLowerCase().includes(courseSearch.toLowerCase()) || c.code.includes(courseSearch)) &&
      c.gradeLevel.includes(gradeStr)
    ).slice(0, 15);
  }, [courseSearch, addingGrade]);

  const selectedClusterObj = DATA.clusters.find(c => c.id === templateCluster);

  const printPlan = () => {
    const w = window.open('', '_blank');
    const html = `<!DOCTYPE html><html><head><title>My 4-Year Plan - District 214</title>
    <style>
      body { font-family: Helvetica, Arial, sans-serif; margin: 40px; color: #1a1a1a; }
      h1 { font-size: 22px; color: #ba0c2f; margin-bottom: 4px; }
      .subtitle { font-size: 12px; color: #888; margin-bottom: 24px; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
      .grade-col { border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
      .grade-header { font-size: 13px; font-weight: bold; color: #ba0c2f; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #ba0c2f; }
      .course { font-size: 12px; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
      .course-code { color: #888; font-size: 10px; }
      .credits { font-size: 10px; color: #888; margin-top: 8px; }
      .req-section { margin-bottom: 24px; }
      .req-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
      .req-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
      .req-met { color: #10b981; font-weight: bold; }
      .req-unmet { color: #ba0c2f; }
      .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e5e7eb; font-size: 10px; color: #888; text-align: center; }
      .ap-badge { background: #dbeafe; color: #1d4ed8; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; margin-left: 4px; }
      .college-badge { background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 600; margin-left: 4px; }
      @media print { body { margin: 20px; } }
    </style></head><body>
    <h1>My 4-Year Academic Plan</h1>
    <div class="subtitle">District 214 Academic Programs & Pathways &bull; Discover your future.</div>
    <div class="grid">
    ${[9,10,11,12].map(g => `<div class="grade-col">
      <div class="grade-header">Grade ${g}</div>
      ${plan[g].length > 0 ? plan[g].map(c => `<div class="course">${c.name}${c.name.startsWith('AP ') ? '<span class="ap-badge">AP</span>' : ''}${c.name.startsWith('College ') ? '<span class="college-badge">DC</span>' : ''} <span class="course-code">${c.code}</span></div>`).join('') : '<div class="course" style="color:#aaa;font-style:italic">No courses added</div>'}
      <div class="credits">${totalCredits(g).toFixed(1)} credits</div>
    </div>`).join('')}
    </div>
    <div class="req-section">
      <div class="req-title">Graduation Requirement Progress</div>
      ${reqProgress.map(r => `<div class="req-row"><span>${r.name}</span><span class="${r.have >= r.need ? 'req-met' : 'req-unmet'}">${r.have.toFixed(1)} / ${r.need} credits ${r.have >= r.need ? '✓' : ''}</span></div>`).join('')}
      <div class="req-row" style="font-weight:bold;border-top:2px solid #e5e7eb;margin-top:4px;padding-top:4px"><span>Total Credits</span><span>${allCredits.toFixed(1)}</span></div>
    </div>
    <div class="footer">
      <strong>District 214 High School District</strong> &bull; www.d214.org<br/>
      This plan is for planning purposes only. Please meet with your school counselor to finalize your course selections.<br/>
      Printed ${new Date().toLocaleDateString()}
    </div>
    </body></html>`;
    w.document.write(html);
    w.document.close();
    w.onload = () => { w.print(); };
  };

  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <h2 className="text-3xl font-bold text-gray-900 tracking-editorial">My 4-Year Plan</h2>
        {allCredits > 0 && (
          <button onClick={printPlan} className="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-soft text-sm font-medium text-gray-700 hover:text-d214red hover:shadow-elevated transition-all" aria-label="Print or save your 4-year plan as PDF">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            Print / Save PDF
          </button>
        )}
      </div>
      <p className="text-gray-500 mb-6">Build your personalized course schedule. Start from a pathway template or add courses individually.</p>

      <div className="bg-white rounded-2xl shadow-soft p-6 mb-8">
        <h3 className="font-semibold text-gray-900 mb-4 text-sm uppercase tracking-wider">Start from a Pathway Template</h3>
        <div className="flex flex-wrap gap-4 items-end">
          <div>
            <label className="text-xs text-gray-400 block mb-1.5 font-medium">Career Cluster</label>
            <select value={templateCluster} onChange={e => { setTemplateCluster(e.target.value); setTemplatePathway(''); }} className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50">
              <option value="">Select cluster...</option>
              {DATA.clusters.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          {templateCluster && selectedClusterObj && (
            <div>
              <label className="text-xs text-gray-400 block mb-1.5 font-medium">Pathway</label>
              <select value={templatePathway} onChange={e => setTemplatePathway(e.target.value)} className="border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50">
                <option value="">Select pathway...</option>
                {selectedClusterObj.pathways.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>

          {templatePathway && (
            <button onClick={loadTemplate} className="bg-d214red text-white px-5 py-2.5 rounded-xl text-sm font-medium hover:bg-red-700 transition-colors shadow-soft">

          {allCredits > 0 && (
            <button onClick={() => setPlan({ 9:[], 10:[], 11:[], 12:[] })} className="text-sm text-gray-400 hover:text-d214red transition-colors ml-2">Clear All</button>

        </div>

      <div className="bg-white rounded-2xl shadow-soft p-6 mb-8">
        <div className="flex justify-between items-center mb-4">
          <h3 className="font-semibold text-gray-900 text-sm uppercase tracking-wider">Graduation Requirement Progress</h3>
          <span className="text-sm text-gray-400 font-medium">{allCredits.toFixed(1)} total credits</span>

                <div className="flex justify-between text-xs mb-1.5">

                  <span className={r.have >= r.need ? 'text-green-600 font-medium' : 'text-gray-400'}>{r.have.toFixed(1)}/{r.need}</span>

                <div className="bg-gray-100 rounded-full h-2.5">

            <div className="p-4 min-h-[200px]">

                    <div className="text-xs text-gray-400">{c.code} &bull; {c.creditSemester} cr</div>

                  <button onClick={() => removeCourse(gradeNum, c.code)} className="text-gray-300 hover:text-d214red ml-2 flex-shrink-0 transition-colors">&times;</button>
                </div>
              ))}
              {addingGrade === gradeNum ? (
                <div className="relative">
                  <input type="text" placeholder="Search courses..." value={courseSearch} onChange={e => setCourseSearch(e.target.value)} autoFocus
                    className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-gray-50 focus:bg-white transition-colors" />
                  <button onClick={() => { setAddingGrade(null); setCourseSearch(''); }} className="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600 transition-colors">&times;</button>
                  {searchResults.length > 0 && (
                    <div className="absolute z-10 w-full bg-white rounded-xl mt-1.5 shadow-elevated max-h-60 overflow-y-auto">
                      {searchResults.map(c => (
                        <div key={c.code} onClick={() => addCourse(gradeNum, c)} className="px-4 py-2.5 text-sm hover:bg-red50 cursor-pointer border-b border-gray-50 last:border-0">
                          <div className="flex items-center gap-1.5 font-medium text-gray-800">
                            {c.name}
                            {c.name.startsWith('AP ') && <span className="text-[9px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full font-semibold">AP</span>}
                            {c.name.startsWith('College ') && <span className="text-[9px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full font-semibold">DC</span>}
                          </div>
                          <div className="text-xs text-gray-400">{c.code} &bull; {c.department}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ) : (
                <button onClick={() => setAddingGrade(gradeNum)} className="w-full border-2 border-dashed border-gray-200 rounded-xl py-2.5 text-sm text-gray-400 hover:border-d214red hover:text-d214red transition-colors">
                  + Add Course
                </button>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
